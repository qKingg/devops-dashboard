<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1724;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2332;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vpcGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="publicGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d8a4e;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#2d8a4e;stop-opacity:0.08" />
    </linearGradient>
    <linearGradient id="privateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:0.05" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ade80"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c084fc"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700" letter-spacing="1">AWS CLOUD METRICS DASHBOARD — ARCHITECTURE</text>

  <!-- ==================== LEFT SIDE: CI/CD Pipeline ==================== -->
  <text x="80" y="95" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="2">APP DEPLOY PIPELINE</text>

  <!-- Separator between pipelines -->
  <line x1="35" y1="340" x2="185" y2="340" stroke="#475569" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="80" y="355" fill="#94a3b8" font-size="9" font-weight="600" letter-spacing="1">INFRASTRUCTURE</text>

  <!-- GitHub -->
  <rect x="30" y="110" width="160" height="52" rx="8" fill="#1c2333" stroke="#4ade80" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="133" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">GitHub Actions</text>
  <text x="110" y="151" text-anchor="middle" fill="#64748b" font-size="9">push to main → trigger</text>

  <!-- OIDC -->
  <rect x="30" y="180" width="160" height="52" rx="8" fill="#1c2333" stroke="#fb923c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="203" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="700">OIDC Auth</text>
  <text x="110" y="221" text-anchor="middle" fill="#64748b" font-size="9">assume IAM role (no keys)</text>

  <!-- Build Steps -->
  <rect x="30" y="250" width="160" height="82" rx="8" fill="#1c2333" stroke="#60a5fa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="273" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">Build Pipeline</text>
  <text x="110" y="293" text-anchor="middle" fill="#94a3b8" font-size="9">1. Build Docker image</text>
  <text x="110" y="307" text-anchor="middle" fill="#94a3b8" font-size="9">2. Trivy security scan</text>
  <text x="110" y="321" text-anchor="middle" fill="#94a3b8" font-size="9">3. Push to ECR</text>

  <!-- Terraform -->
  <rect x="30" y="365" width="160" height="52" rx="8" fill="#1c2333" stroke="#c084fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="388" text-anchor="middle" fill="#c084fc" font-size="12" font-weight="700">Terraform</text>
  <text x="110" y="406" text-anchor="middle" fill="#64748b" font-size="9">Separate state per concern</text>

  <!-- CI/CD arrows -->
  <line x1="110" y1="162" x2="110" y2="180" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="110" y1="232" x2="110" y2="250" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <!-- No arrow here: Terraform is a separate workflow from Build Pipeline -->

  <!-- ==================== MAIN: AWS VPC ==================== -->
  <!-- VPC boundary -->
  <rect x="240" y="80" width="620" height="650" rx="10" fill="url(#vpcGrad)" stroke="#3b82f6" stroke-width="1" stroke-dasharray="6,3" opacity="0.9"/>
  <text x="260" y="103" fill="#3b82f6" font-size="11" font-weight="700" letter-spacing="1">AWS VPC — 10.0.0.0/16</text>
  <text x="260" y="118" fill="#64748b" font-size="9">Region: eu-central-1 • 2 Availability Zones</text>

  <!-- Public Subnets -->
  <rect x="260" y="135" width="580" height="150" rx="8" fill="url(#publicGrad)" stroke="#4ade80" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="280" y="155" fill="#4ade80" font-size="10" font-weight="600" letter-spacing="1">PUBLIC SUBNETS</text>

  <!-- IGW -->
  <rect x="490" y="82" width="120" height="36" rx="6" fill="#1c2333" stroke="#22d3ee" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="105" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="700">Internet GW</text>

  <!-- ALB -->
  <rect x="390" y="165" width="260" height="65" rx="8" fill="#1c2333" stroke="#4ade80" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="520" y="190" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700">Application Load Balancer</text>
  <text x="520" y="206" text-anchor="middle" fill="#94a3b8" font-size="9">HTTPS:443 • SSL termination • Health checks on /health</text>
  <text x="520" y="220" text-anchor="middle" fill="#64748b" font-size="9">AZ-a: 10.0.1.0/24  •  AZ-b: 10.0.2.0/24</text>

  <!-- NAT Gateway -->
  <rect x="280" y="170" width="90" height="50" rx="6" fill="#1c2333" stroke="#fbbf24" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="325" y="193" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">NAT GW</text>
  <text x="325" y="208" text-anchor="middle" fill="#64748b" font-size="8">Elastic IP</text>

  <!-- Arrow: IGW to ALB -->
  <line x1="550" y1="118" x2="550" y2="165" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowCyan)"/>

  <!-- Private Subnets -->
  <rect x="260" y="305" width="580" height="270" rx="8" fill="url(#privateGrad)" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="280" y="325" fill="#ef4444" font-size="10" font-weight="600" letter-spacing="1">PRIVATE SUBNETS</text>
  <text x="500" y="325" fill="#64748b" font-size="9">AZ-a: 10.0.10.0/24  •  AZ-b: 10.0.20.0/24</text>

  <!-- ECS Cluster -->
  <rect x="300" y="340" width="510" height="100" rx="8" fill="#0f1724" stroke="#60a5fa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="555" y="362" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">ECS Fargate Service</text>
  <text x="555" y="378" text-anchor="middle" fill="#64748b" font-size="9">Desired count: 2 • Auto-scaling on CPU > 70%</text>

  <!-- Task 1 -->
  <rect x="320" y="390" width="170" height="40" rx="6" fill="#1a2744" stroke="#818cf8" stroke-width="1" filter="url(#shadow)"/>
  <text x="405" y="408" text-anchor="middle" fill="#818cf8" font-size="10" font-weight="600">Task 1 — AZ-a</text>
  <text x="405" y="422" text-anchor="middle" fill="#64748b" font-size="8">Flask :5000 • 0.25 vCPU • 512MB</text>

  <!-- Task 2 -->
  <rect x="620" y="390" width="170" height="40" rx="6" fill="#1a2744" stroke="#818cf8" stroke-width="1" filter="url(#shadow)"/>
  <text x="705" y="408" text-anchor="middle" fill="#818cf8" font-size="10" font-weight="600">Task 2 — AZ-b</text>
  <text x="705" y="422" text-anchor="middle" fill="#64748b" font-size="8">Flask :5000 • 0.25 vCPU • 512MB</text>

  <!-- RDS -->
  <rect x="370" y="490" width="310" height="70" rx="8" fill="#1c2333" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="525" y="515" text-anchor="middle" fill="#f97316" font-size="13" font-weight="700">RDS PostgreSQL</text>
  <text x="525" y="533" text-anchor="middle" fill="#94a3b8" font-size="9">db.t3.micro • Automated backups • Port 5432</text>
  <text x="525" y="548" text-anchor="middle" fill="#64748b" font-size="9">SG: allow 5432 from ECS SG only</text>

  <!-- ALB to Tasks arrows -->
  <line x1="470" y1="230" x2="405" y2="390" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <line x1="570" y1="230" x2="705" y2="390" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>

  <!-- Tasks to RDS arrows -->
  <line x1="405" y1="430" x2="460" y2="490" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>
  <line x1="705" y1="430" x2="590" y2="490" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>

  <!-- NAT to private arrow -->
  <line x1="325" y1="220" x2="325" y2="305" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>

  <!-- ==================== RIGHT SIDE: AWS Services ==================== -->
  <text x="905" y="95" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="2">AWS SERVICES</text>

  <!-- ECR -->
  <rect x="890" y="110" width="170" height="52" rx="8" fill="#1c2333" stroke="#60a5fa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="975" y="133" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">ECR</text>
  <text x="975" y="151" text-anchor="middle" fill="#64748b" font-size="9">Container registry</text>

  <!-- Secrets Manager -->
  <rect x="890" y="180" width="170" height="52" rx="8" fill="#1c2333" stroke="#fb923c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="975" y="203" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="700">Secrets Manager</text>
  <text x="975" y="221" text-anchor="middle" fill="#64748b" font-size="9">DB credentials, API keys</text>

  <!-- CloudWatch -->
  <rect x="890" y="260" width="170" height="85" rx="8" fill="#1c2333" stroke="#22d3ee" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="975" y="285" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="700">CloudWatch</text>
  <text x="975" y="305" text-anchor="middle" fill="#94a3b8" font-size="9">Dashboard: CPU, Mem,</text>
  <text x="975" y="319" text-anchor="middle" fill="#94a3b8" font-size="9">Requests, DB Connections</text>
  <text x="975" y="336" text-anchor="middle" fill="#64748b" font-size="9">Alarm → SNS → Email</text>

  <!-- S3 + DynamoDB for TF state -->
  <rect x="890" y="365" width="170" height="52" rx="8" fill="#1c2333" stroke="#c084fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="975" y="388" text-anchor="middle" fill="#c084fc" font-size="12" font-weight="700">S3 + DynamoDB</text>
  <text x="975" y="406" text-anchor="middle" fill="#64748b" font-size="9">Terraform remote state + lock</text>

  <!-- SNS -->
  <rect x="890" y="435" width="170" height="52" rx="8" fill="#1c2333" stroke="#f472b6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="975" y="458" text-anchor="middle" fill="#f472b6" font-size="12" font-weight="700">SNS Topic</text>
  <text x="975" y="476" text-anchor="middle" fill="#64748b" font-size="9">Alarm notifications → email</text>

  <!-- Connection lines: CI/CD to AWS -->
  <line x1="190" y1="291" x2="890" y2="136" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3" opacity="0.5" marker-end="url(#arrowBlue)"/>
  <line x1="190" y1="391" x2="260" y2="391" stroke="#c084fc" stroke-width="1" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrowPurple)"/>

  <!-- Connection: ECS to Secrets Manager -->
  <line x1="810" y1="380" x2="890" y2="206" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,3" opacity="0.5" marker-end="url(#arrowOrange)"/>

  <!-- Connection: ECS to CloudWatch -->
  <line x1="810" y1="400" x2="890" y2="300" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,3" opacity="0.5" marker-end="url(#arrowCyan)"/>

  <!-- ==================== BOTTOM: Users + Flow Description ==================== -->
  <!-- Internet User -->
  <rect x="460" y="12" width="85" height="30" rx="15" fill="#1c2333" stroke="#e2e8f0" stroke-width="1"/>
  <text x="503" y="32" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">👤 Users</text>

  <!-- Route53 + ACM -->
  <rect x="380" y="50" width="245" height="28" rx="6" fill="#1c2333" stroke="#22d3ee" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="503" y="68" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="700">Route 53 + ACM — dashboard.catalinpatrut.com</text>

  <!-- Arrow: Users → Route53 -->
  <line x1="503" y1="42" x2="503" y2="50" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowCyan)"/>
  <!-- Arrow: Route53 → IGW -->
  <line x1="550" y1="78" x2="550" y2="82" stroke="#22d3ee" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrowCyan)"/>

  <!-- Security annotations -->
  <rect x="260" y="600" width="580" height="120" rx="8" fill="#1a1f2e" stroke="#475569" stroke-width="0.5"/>
  <text x="280" y="622" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="1">🔒 SECURITY LAYERS</text>
  <text x="290" y="642" fill="#64748b" font-size="9">• ALB in public subnets — only entry point from internet</text>
  <text x="290" y="658" fill="#64748b" font-size="9">• ECS + RDS in private subnets — no direct internet access</text>
  <text x="290" y="674" fill="#64748b" font-size="9">• NAT Gateway — outbound only (ECR pulls, CloudWatch)</text>
  <text x="290" y="690" fill="#64748b" font-size="9">• Secrets Manager — no hardcoded credentials in code or env vars</text>
  <text x="290" y="706" fill="#64748b" font-size="9">• OIDC — GitHub Actions uses temporary STS credentials</text>

  <!-- Traffic flow annotations -->
  <text x="560" y="642" fill="#64748b" font-size="9">• Security Groups: least-privilege per service</text>
  <text x="560" y="658" fill="#64748b" font-size="9">• Trivy scan — every image before deployment</text>
  <text x="560" y="674" fill="#64748b" font-size="9">• IAM roles — scoped per service, no wildcard (*)</text>
  <text x="560" y="690" fill="#64748b" font-size="9">• RDS SG — port 5432 from ECS SG only</text>
  <text x="560" y="706" fill="#64748b" font-size="9">• CloudWatch alarms — CPU > 80%, Storage &lt; 20%</text>

  <!-- Legend -->
  <rect x="260" y="740" width="580" height="50" rx="8" fill="#0f1724" stroke="#334155" stroke-width="0.5"/>
  <text x="280" y="758" fill="#94a3b8" font-size="9" font-weight="600">TRAFFIC FLOW:</text>
  <line x1="370" y1="754" x2="410" y2="754" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="418" y="758" fill="#64748b" font-size="9">Internet</text>
  <line x1="470" y1="754" x2="510" y2="754" stroke="#4ade80" stroke-width="1.5"/>
  <text x="518" y="758" fill="#64748b" font-size="9">HTTP/S</text>
  <line x1="555" y1="754" x2="595" y2="754" stroke="#fb923c" stroke-width="1.5"/>
  <text x="603" y="758" fill="#64748b" font-size="9">Database</text>
  <line x1="660" y1="754" x2="700" y2="754" stroke="#c084fc" stroke-width="1.5"/>
  <text x="708" y="758" fill="#64748b" font-size="9">IaC</text>

  <text x="280" y="778" fill="#94a3b8" font-size="9" font-weight="600">ESTIMATED COST:</text>
  <text x="380" y="778" fill="#64748b" font-size="9">NAT ~$32 • ALB ~$16 • Fargate ~$15 • RDS ~$13 • Total ~$80/mo (destroy after demo)</text>
</svg>
